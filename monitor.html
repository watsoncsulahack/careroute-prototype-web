<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>CareRoute Live Monitor</title><style>body{font-family:Arial;background:#111;color:#fff;padding:16px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #444;padding:6px}</style></head><body>
<h2>CareRoute Live Registrations</h2><div id='stat'>loading...</div><table id='t'><thead><tr><th>Time</th><th>Name</th><th>Email</th><th>Insurance</th></tr></thead><tbody></tbody></table>
<script>
const API_BASE = localStorage.getItem('careroute_api_base') || 'http://127.0.0.1:8120';
async function load(){
  try{const r=await fetch(API_BASE+'/api/registrations');const j=await r.json();const rows=(j.rows||[]);
  document.getElementById('stat').innerText='records: '+rows.length+' (auto refresh 2s)';
  document.querySelector('#t tbody').innerHTML=rows.map(x=>`<tr><td>${new Date(x.timestamp||Date.now()).toLocaleTimeString()}</td><td>${x.firstName||''} ${x.lastName||''}</td><td>${x.email||''}</td><td>${x.insurance||''}</td></tr>`).join('');
  }catch(e){document.getElementById('stat').innerText='monitor offline';}
}
setInterval(load,2000);load();
</script></body></html>

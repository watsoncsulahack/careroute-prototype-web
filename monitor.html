<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CareRoute Live Monitor</title>
  <style>
    body{font-family:Arial;background:#111827;color:#fff;padding:16px;margin:0}
    .wrap{max-width:960px;margin:0 auto}
    table{width:100%;border-collapse:collapse;background:#1f2937}
    td,th{border:1px solid #374151;padding:8px;text-align:left}
    .muted{color:#94a3b8}
  </style>
</head>
<body>
<div class="wrap">
  <h2 style="margin:0 0 8px">CareRoute Live Registrations</h2>
  <p id="status" class="muted">Loading...</p>
  <table>
    <thead><tr><th>Time</th><th>Name</th><th>Email</th><th>Insurance</th><th>Source</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>
const cloudantHost = '7d5f26cb-f87a-493c-b84f-7d1357a2f9b3-bluemix.cloudantnosqldb.appdomain.cloud';
const dbName = 'careroute_demo_live';
const localBridge = localStorage.getItem('careroute_api_base') || '';

function sameOriginCloudantMode() { return location.hostname === cloudantHost; }
function cloudantDocsUrl() {
  return `https://${cloudantHost}/${dbName}/_all_docs?include_docs=true&descending=true&limit=200`;
}

function renderRows(rows){
  document.getElementById('rows').innerHTML = rows.map(d => `
    <tr>
      <td>${new Date(d.timestamp || Date.now()).toLocaleTimeString()}</td>
      <td>${(d.firstName||'')} ${(d.lastName||'')}</td>
      <td>${d.email||''}</td>
      <td>${d.insurance||''}</td>
      <td>${d.source||'unknown'}</td>
    </tr>`).join('');
}

function normalizeFromAllDocs(payload){
  const docs = (payload.rows || []).map(r => r.doc).filter(Boolean);
  return docs.filter(d => d.type === 'registration').sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
}

function loadViaJsonp(){
  return new Promise((resolve, reject) => {
    const cb = '__careroute_jsonp_' + Date.now();
    window[cb] = (payload) => {
      try {
        const rows = normalizeFromAllDocs(payload);
        resolve(rows);
      } finally {
        delete window[cb];
        script.remove();
      }
    };
    const script = document.createElement('script');
    script.src = `${cloudantDocsUrl()}&callback=${cb}`;
    script.onerror = () => { delete window[cb]; reject(new Error('JSONP load failed')); };
    document.head.appendChild(script);
  });
}

async function load(){
  try {
    let rows = [];

    if (sameOriginCloudantMode()) {
      const r = await fetch(`/${dbName}/_all_docs?include_docs=true&descending=true&limit=200`);
      const j = await r.json();
      rows = normalizeFromAllDocs(j);
      document.getElementById('status').textContent = `Live mode (Cloudant origin). Records: ${rows.length}. Refresh: 2s`;
    } else if (localBridge) {
      const r = await fetch(`${localBridge}/api/registrations`);
      const j = await r.json();
      rows = (j.rows || []).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
      document.getElementById('status').textContent = `Bridge mode (${localBridge}). Records: ${rows.length}. Refresh: 2s`;
    } else {
      rows = await loadViaJsonp();
      document.getElementById('status').textContent = `Online mode (Cloudant JSONP). Records: ${rows.length}. Refresh: 2s`;
    }

    renderRows(rows);
  } catch (e) {
    document.getElementById('status').textContent = `Monitor error: ${e.message}`;
  }
}

load();
setInterval(load, 2000);
</script>
</body>
</html>

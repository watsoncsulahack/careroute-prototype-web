<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CareRoute Live Monitor</title>
  <style>
    body{font-family:Arial;background:#111827;color:#fff;padding:16px;margin:0}
    .wrap{max-width:960px;margin:0 auto}
    table{width:100%;border-collapse:collapse;background:#1f2937}
    td,th{border:1px solid #374151;padding:8px;text-align:left}
    .muted{color:#94a3b8}
  </style>
</head>
<body>
<div class="wrap">
  <h2 style="margin:0 0 8px">CareRoute Live Registrations</h2>
  <p class="muted" style="margin:0 0 4px">Build: 2026-03-17-r5</p>
  <p id="status" class="muted">Connecting...</p>
  <table>
    <thead><tr><th>Time</th><th>Name</th><th>Email</th><th>Insurance</th><th>Source</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>
const cloudantHost = '7d5f26cb-f87a-493c-b84f-7d1357a2f9b3-bluemix.cloudantnosqldb.appdomain.cloud';
const dbName = 'careroute_demo_live';
const localBridge = localStorage.getItem('careroute_api_base') || '';
const cloudantBase = `https://${cloudantHost}/${dbName}`;

const state = {
  rowsById: new Map(),
  lastSeq: '0',
  startedAt: Date.now()
};

function status(s){ document.getElementById('status').textContent = s; }

function renderRows(){
  const rows = [...state.rowsById.values()]
    .filter(Boolean)
    .sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))
    .slice(0, 250);

  document.getElementById('rows').innerHTML = rows.map(d => `
    <tr>
      <td>${new Date(d.timestamp || Date.now()).toLocaleTimeString()}</td>
      <td>${(d.firstName||'')} ${(d.lastName||'')}</td>
      <td>${d.email||''}</td>
      <td>${d.insurance||''}</td>
      <td>${d.source||'unknown'}</td>
    </tr>`).join('');

  const age = Math.floor((Date.now() - state.startedAt)/1000);
  status(`Live stream active. Records: ${rows.length}. Running ${age}s.`);
}

function upsertDoc(doc){
  if(!doc || doc.type !== 'registration') return;
  const key = doc._id || `${doc.email||'unknown'}:${doc.timestamp||Date.now()}`;
  state.rowsById.set(key, doc);
}

function jsonp(url){
  return new Promise((resolve, reject) => {
    const cb = '__careroute_jsonp_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    const script = document.createElement('script');
    window[cb] = (payload) => {
      try { resolve(payload); }
      finally {
        delete window[cb];
        script.remove();
      }
    };
    script.src = `${url}${url.includes('?') ? '&' : '?'}callback=${cb}&_=${Date.now()}`;
    script.onerror = () => {
      delete window[cb];
      script.remove();
      reject(new Error('JSONP request failed'));
    };
    document.head.appendChild(script);
  });
}

async function bootstrapFromSnapshot(){
  const payload = await jsonp(`${cloudantBase}/_all_docs?include_docs=true&descending=true&limit=250&update_seq=true`);
  (payload.rows || []).forEach(r => upsertDoc(r.doc));
  if(payload.update_seq) state.lastSeq = payload.update_seq;
  renderRows();
}

function startFastSnapshotLoop(){
  // safety net for live demos: keeps feed visually fresh even if longpoll stalls
  setInterval(async () => {
    try {
      const payload = await jsonp(`${cloudantBase}/_all_docs?include_docs=true&descending=true&limit=250`);
      (payload.rows || []).forEach(r => upsertDoc(r.doc));
      renderRows();
    } catch (_) {}
  }, 1200);
}

async function pollChangesJsonp(){
  try {
    const since = encodeURIComponent(state.lastSeq || 'now');
    const payload = await jsonp(`${cloudantBase}/_changes?since=${since}&feed=longpoll&timeout=12000&heartbeat=5000&include_docs=true`);
    (payload.results || []).forEach(c => upsertDoc(c.doc));
    if(payload.last_seq) state.lastSeq = payload.last_seq;
    renderRows();
    setTimeout(pollChangesJsonp, 60);
  } catch (e) {
    status(`Reconnect after error: ${e.message}`);
    setTimeout(pollChangesJsonp, 900);
  }
}

async function pollBridgeFast(){
  try {
    const r = await fetch(`${localBridge}/api/registrations?_=${Date.now()}`, { cache: 'no-store' });
    const j = await r.json();
    state.rowsById.clear();
    (j.rows || []).forEach(upsertDoc);
    renderRows();
  } catch (e) {
    status(`Bridge monitor error: ${e.message}`);
  }
  setTimeout(pollBridgeFast, 700);
}

(async function start(){
  try {
    if(localBridge){
      status(`Bridge mode (${localBridge})`);
      await pollBridgeFast();
      return;
    }

    // Cloudant JSONP stream mode (works from GitHub Pages and Cloudant-hosted page)
    await bootstrapFromSnapshot();
    startFastSnapshotLoop();
    pollChangesJsonp();
  } catch (e) {
    status(`Monitor failed to start: ${e.message}`);
  }
})();
</script>
</body>
</html>
